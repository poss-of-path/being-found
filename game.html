<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>posspath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── PAGE SYSTEM ── */
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ── SHARED LABELS ── */
    .label-small {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
      text-align: center;
    }

    .label-big {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: #111;
      line-height: 1.05;
      text-align: center;
    }

    /* ── HOME PAGE ── */
    #page-home {
      padding: 60px 24px;
    }

    #page-home .label-big {
      font-size: 48px;
      margin-bottom: 6px;
    }

    .home-subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: #bbb;
      margin-bottom: 52px;
      text-align: center;
      font-style: italic;
    }

    .winners-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }

    .winner-btn {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
      border: 1.5px solid #111;
      padding: 16px 22px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
      width: 100%;
      font-family: 'Inter', sans-serif;
    }

    .winner-btn:hover {
      background: #111;
      color: #fff;
    }

    .winner-btn:hover .btn-rank,
    .winner-btn:hover .btn-group,
    .winner-btn:hover .btn-place {
      color: #fff;
    }

    .winner-btn:hover .btn-divider {
      background: #555;
    }

    .btn-place {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      min-width: 52px;
      transition: color 0.15s;
    }

    .btn-divider {
      width: 1px;
      height: 28px;
      background: #ddd;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .btn-rank {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      min-width: 36px;
      transition: color 0.15s;
    }

    .btn-group {
      font-size: 13px;
      font-weight: 500;
      color: #444;
      flex: 1;
      transition: color 0.15s;
    }

    .btn-arrow {
      font-size: 16px;
      color: #ccc;
      transition: color 0.15s;
      margin-left: auto;
    }

    .winner-btn:hover .btn-arrow { color: #fff; }

    /* ── CONGRATS PAGE ── */
    #page-congrats {
      padding: 48px 0 36px;
      width: 100%;
      overflow: hidden;
    }

    .congrats-inner {
      text-align: center;
      width: 100%;
    }

    #page-congrats .label-big {
      font-size: 48px;
      margin-bottom: 4px;
    }

    .congrats-sub {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #bbb;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 36px;
      text-align: center;
    }

    /* ── STAGE / PIXEL PEOPLE ── */
    .stage {
      position: relative;
      width: 100%;
      height: 130px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .ground {
      position: absolute;
      bottom: 8px;
      left: 0;
      width: 100%;
      height: 1px;
      background: #e5e5e5;
    }

    .person {
      position: absolute;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .head {
      width: 38px;
      height: 38px;
      background: #fff;
      border: 2px solid #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 5px;
      font-weight: 600;
      color: #111;
      text-align: center;
      line-height: 1.3;
      padding: 3px;
    }

    .body-wrap {
      position: relative;
      width: 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .torso {
      width: 14px;
      height: 22px;
      background: #111;
      margin-top: 1px;
      position: relative;
      z-index: 2;
    }

    .arms {
      position: absolute;
      top: 1px;
      left: 0;
      width: 42px;
      display: flex;
      justify-content: space-between;
      z-index: 1;
    }

    .arm {
      width: 5px;
      height: 15px;
      background: #111;
      transform-origin: top center;
    }

    .legs {
      display: flex;
      gap: 3px;
      margin-top: 1px;
    }

    .leg {
      width: 5px;
      height: 18px;
      background: #111;
      transform-origin: top center;
    }

    /* ── CAPTION ── */
    .caption {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #777;
      max-width: 540px;
      margin: 0 auto 32px;
      line-height: 1.75;
      padding: 0 24px;
      text-align: center;
    }

    .caption strong {
      color: #111;
      font-weight: 600;
    }

    /* ── MEMBER LIST ── */
    .member-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 560px;
      margin: 0 auto 36px;
      padding: 0 24px;
    }

    .member-tag {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      border: 1px solid #ddd;
      padding: 4px 12px;
      letter-spacing: 0.02em;
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #aaa;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.15s;
      text-align: center;
      display: block;
      margin: 0 auto;
    }

    .back-btn:hover { color: #111; }
    .back-btn::before { content: "← "; }
  </style>
</head>
<body>

  <!-- ══════════════════ HOME PAGE ══════════════════ -->
  <div class="page active" id="page-home">
    <div class="label-small">posspath</div>
    <div class="label-big">The Winners</div>
    <div class="home-subtitle">on this path</div>

    <div class="winners-list" id="winners-list"></div>
  </div>

  <!-- ══════════════════ CONGRATS PAGE ══════════════════ -->
  <div class="page" id="page-congrats">
    <div class="congrats-inner">
      <div class="label-small">posspath</div>
      <div class="label-big">CONGRATULATIONS</div>
      <div class="congrats-sub" id="congrats-sub"></div>

      <div class="stage" id="stage">
        <div class="ground"></div>
      </div>

      <div class="caption" id="caption"></div>

      <div class="member-list" id="member-list"></div>

      <button class="back-btn" onclick="goHome()">Back</button>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       DATA — edit here as needed
    ═══════════════════════════════════════════ */
    const groups = [
      {
        rank: 1,
        group: "02 HAA GAMAU AJG",
        members: [
          ["Oh", "Haewon"], ["Mario", "Caesar"], ["Shin", "Junghwan"],
          ["Lee", "Sangwon"], ["Lee", "Donghwa"], ["Kang", "Woojin"],
          ["Han", "Taesan"], ["Zhang", "Hao"], ["Kim", "Stella"]
        ]
      },
      {
        rank: 2,
        group: "Kl4pon",
        members: [
          ["Yoo", "Jimin"], ["Naoi", "Rei"], ["Park", "Wonbin"],
          ["Bang", "Jeemin"], ["Jo", "Yihyun"], ["Koo", "Jungmo"],
          ["Shen", "Ricky"], ["Kim", "Ryul"], ["Niky", "Putra"]
        ]
      },
      {
        rank: 3,
        group: "Simpang Tiga",
        members: [
          ["Kim", "Gyuvin"], ["Carmenita", ""], ["Asakura", "Jo"],
          ["Kim", "Mingyu"], ["Ning", "Yizhuo"], ["Han", "Jihoon"],
          ["Jang", "Wonyoung"], ["Jung", "Sungchan"], ["Kwon", "Ohyul"]
        ]
      },
      {
        rank: 4,
        group: "NAKAL DAN BENGI5",
        members: [
          ["Lee", "Kyungmin"], ["Park", "Minju"], ["Anton", "Lee"],
          ["Shin", "Ryujin"], ["Han", "Zhen"], ["Sung", "Hanbin"],
          ["Nakakita", "Yuma"], ["Park", "Sunghoon"], ["Kim", "Dohoon"]
        ]
      },
      {
        rank: 5,
        group: "ALLAH MAHA SATU",
        members: [
          ["Hamada", "Asahi"], ["Choi", "Jiwoo"], ["Choi", "Minje"],
          ["Tanaka", "Anna"], ["Park", "Jongseong"], ["Kimi", "Antonelli"],
          ["Sim", "Jaeyun"], ["Kim", "Leehan"], ["Yu", "Haram"]
        ]
      }
    ];

    const ordinal = n => ["1st","2nd","3rd","4th","5th"][n-1] || n+"th";

    /* ── Build home buttons ── */
    const list = document.getElementById('winners-list');
    groups.forEach((g, i) => {
      const btn = document.createElement('button');
      btn.className = 'winner-btn';
      btn.innerHTML = `
        <span class="btn-place">Juara ${g.rank}</span>
        <span class="btn-divider"></span>
        <span class="btn-rank">${ordinal(g.rank)}</span>
        <span class="btn-group">${g.group}</span>
        <span class="btn-arrow">→</span>
      `;
      btn.onclick = () => openCongrats(i);
      list.appendChild(btn);
    });

    /* ── Animation state ── */
    let animId = null;
    let personObjs = [];

    function buildStage(members) {
      const stage = document.getElementById('stage');
      // clear previous persons (keep ground)
      stage.querySelectorAll('.person').forEach(el => el.remove());
      personObjs = [];

      const spacing = 80;
      members.forEach((name, i) => {
        const el = document.createElement('div');
        el.className = 'person';
        const line1 = name[0];
        const line2 = name[1];
        el.innerHTML = `
          <div class="head">${line1}${line2 ? '<br>' + line2 : ''}</div>
          <div class="body-wrap">
            <div class="arms">
              <div class="arm" id="arml_${i}"></div>
              <div class="arm" id="armr_${i}"></div>
            </div>
            <div class="torso"></div>
          </div>
          <div class="legs">
            <div class="leg" id="legl_${i}"></div>
            <div class="leg" id="legr_${i}"></div>
          </div>
        `;
        stage.appendChild(el);
        personObjs.push({
          el,
          x: window.innerWidth + i * spacing + 60,
          phase: i * 0.65
        });
      });
    }

    function startAnim() {
      if (animId) cancelAnimationFrame(animId);
      const stage = document.getElementById('stage');

      function frame() {
        const t = performance.now() / 1000;
        const stageW = stage.offsetWidth;
        personObjs.forEach((p, i) => {
          p.x -= 0.65;
          if (p.x < -60) p.x = stageW + 60;
          p.el.style.left = p.x + 'px';
          const cycle = t * 3.5 + p.phase;
          const la = Math.sin(cycle) * 28;
          const aa = Math.sin(cycle + Math.PI) * 22;
          const ll = document.getElementById(`legl_${i}`);
          const lr = document.getElementById(`legr_${i}`);
          const al = document.getElementById(`arml_${i}`);
          const ar = document.getElementById(`armr_${i}`);
          if (ll) ll.style.transform = `rotate(${la}deg)`;
          if (lr) lr.style.transform = `rotate(${-la}deg)`;
          if (al) al.style.transform = `rotate(${aa}deg)`;
          if (ar) ar.style.transform = `rotate(${-aa}deg)`;
        });
        animId = requestAnimationFrame(frame);
      }
      animId = requestAnimationFrame(frame);
    }

    function openCongrats(idx) {
      const g = groups[idx];

      document.getElementById('congrats-sub').textContent =
        `${g.group} — ${ordinal(g.rank)} place`;

      document.getElementById('caption').innerHTML =
        `Congratulations <strong>${g.group}</strong> for possibly winning the <strong>${ordinal(g.rank)}</strong> place in this path. They have successfully completed and met the best possibilities on this path — may we cross paths with them again somewhere!`;

      const ml = document.getElementById('member-list');
      ml.innerHTML = '';
      g.members.forEach(name => {
        const tag = document.createElement('div');
        tag.className = 'member-tag';
        tag.textContent = (name[0] + (name[1] ? ' ' + name[1] : '')).trim();
        ml.appendChild(tag);
      });

      buildStage(g.members);

      document.getElementById('page-home').classList.remove('active');
      document.getElementById('page-congrats').classList.add('active');

      startAnim();
    }

    function goHome() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      document.getElementById('page-congrats').classList.remove('active');
      document.getElementById('page-home').classList.add('active');
    }
  </script>
</body>
</html>
